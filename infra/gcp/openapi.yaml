openapi: 3.0.0
info:
  title: Example API
  version: 1.0.0
paths:
  /hello:
    get:
      summary: Returns a greeting
      operationId: hello
      responses:
        '200':
          description: A successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string